name: Deploy

# Deploys to trade.aiorkesta.com when CI passes on main branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI passed
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t trade-aiorkesta:${{ github.sha }} .
          docker tag trade-aiorkesta:${{ github.sha }} trade-aiorkesta:latest

      - name: Save Docker image
        run: |
          docker save trade-aiorkesta:latest | gzip > trade-aiorkesta.tar.gz

      # NOTE: Deployment step requires secrets to be configured:
      # - DEPLOY_HOST: trade.aiorkesta.com server IP/hostname
      # - DEPLOY_SSH_KEY: SSH private key for deployment
      # - DEPLOY_USER: SSH user (e.g., ubuntu, ec2-user)

